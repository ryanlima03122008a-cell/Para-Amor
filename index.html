<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Minha MIMi 🌻🍁</title><style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  text-align: center;
  padding: 20px;
}

.envelope {
  width: 260px;
  height: 180px;
  background: #ff4d6d;
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  margin: auto;
  transition: 0.4s;
}

.envelope::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #ff758f;
  clip-path: polygon(0 0, 50% 50%, 100% 0);
  transition: 0.4s;
}

.envelope.open::before {
  transform: rotateX(180deg);
}

.letter {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: white;
  padding: 15px;
  border-radius: 10px;
  width: 220px;
  transition: 0.4s;
}

.envelope.open .letter {
  transform: translate(-50%, -50%) scale(1);
}

.letter img {
  width: 80px;
  margin: 10px 0;
}

.message {
  font-size: 16px;
  color: #333;
}

.highlight {
  color: #ff4d6d;
  font-weight: bold;
}

button {
  margin-top: 25px;
  padding: 14px 22px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

button:active {
  transform: scale(0.95);
}

</style></head><body><div class="container">  <div class="envelope" id="envelope">
    <div class="letter"><img src="https://img.freepik.com/vector-premium/pulgar-dedos-imprimir-marca-huella-dactilar-amor-corazon_53500-1839.jpg">
  
  <p class="message">Para meu Amor 👑❤️ <br><span class="highlight">Te Amo!</span></p>
  
  <img src="mochixd.png">

</div>

  </div><button id="goToFlowers">Ver suas flores 🌻</button>

</div><audio id="bg-music" loop>
  <source src="flormusica.mp3" type="audio/mpeg">
</audio><script>
const envelope = document.getElementById("envelope");
const music = document.getElementById("bg-music");

let opened = false;

envelope.addEventListener("click", () => {
  envelope.classList.toggle("open");

  if (!opened) {
    music.play().catch(() => {});
    opened = true;
  }
});

// Melhor navegação pra celular
const btn = document.getElementById("goToFlowers");

btn.addEventListener("touchstart", go);
btn.addEventListener("click", go);

function go() {
  window.location.href = "index1.html";
}

</script></body>
</html>
