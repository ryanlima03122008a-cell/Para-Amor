<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Minha Princesa 🌻🍁</title><style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--dark:#000}

body{
  display:flex;
  align-items:flex-end;
  justify-content:center;
  min-height:100vh;
  background:#000;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* 🔥 Otimização: reduz peso no celular */
.night{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,#111,#000);
  z-index:0;
}

/* ⭐ estrelas leves */
.star{
  position:absolute;
  width:2px;height:2px;
  background:#fff;
  opacity:0.6;
  animation:blink 2s infinite;
}

@keyframes blink{50%{opacity:1}}

/* 🌸 flores (mais leves) */
.flowers{
  position:relative;
  transform:scale(0.8);
  z-index:2;
}

.flower{
  font-size:40px;
  animation:float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

/* 💬 texto */
.texto{
  position:fixed;
  top:5%;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:18px;
  text-align:center;
  z-index:3;
  opacity:0;
  animation:fade 2s forwards 1s;
}

@keyframes fade{to{opacity:1}}

/* 🔘 botão voltar */
button{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:#fff;
  font-size:16px;
}

button:active{transform:translateX(-50%) scale(0.95)}

</style></head><body><div class="night"></div><div class="texto">Para minha princesa 👑❤️<br>Essas flores são pra você 🌻</div><div class="flowers">
  <div class="flower">🌻🌸🌷</div>
</div><button onclick="voltar()">Voltar 💌</button>

<script>
// ⭐ gerar estrelas leves
for(let i=0;i<30;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.top=Math.random()*100+'%';
  s.style.left=Math.random()*100+'%';
  document.body.appendChild(s);
}

function voltar(){
  window.location.href='index.html';
}
</script></body>
</html>
